<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:f="http://xmlns.jcp.org/jsf/core"
                xmlns:p="http://primefaces.org/ui"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets">

				<h:form id="formLogs">
				                    <p:dataTable id="tablaLogs" value="#{logBean.logs}" var="l" 
				                                 paginator="true" rows="10" paginatorPosition="bottom"
				                                 size="small" stripedRows="true">
				                        
				                        <p:column headerText="ID" width="70" styleClass="text-center">#{l.idLog}</p:column>
				                        <p:column headerText="Fecha y Hora" width="200">
				                            <h:outputText value="#{l.fecha}">
				                                <f:convertDateTime pattern="dd/MM/yyyy HH:mm:ss" type="localDateTime"/>
				                            </h:outputText>
				                        </p:column>
				                        <p:column headerText="Acción">#{l.accion}</p:column>

				                        <f:facet name="footer">
				                            <p:commandButton value="Actualizar" icon="pi pi-refresh" 
				                                             update="tablaLogs" action="#{logBean.refrescar}" 
				                                             styleClass="ui-button-flat" />
				                        </f:facet>
				                    </p:dataTable>
				                </h:form>
</ui:composition>
